name: Daily Paper WeChat Digest

on:
  schedule:
    # Every day at 08:30 Beijing time.
    - cron: "30 8 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
          LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS }}
          MAX_ITEMS: ${{ secrets.MAX_ITEMS }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python daily_digest.py

      - name: Commit updated state and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_items.json reports/latest.md reports || true
          git diff --cached --quiet || git commit -m "Update daily paper digest"
          git push
